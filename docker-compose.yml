# =============================================================================
# SCIE — Social Intelligence Engine
# Docker Compose Development Environment
# Usage: docker-compose up -d
# =============================================================================

networks:
  scie-network:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  minio_data:
  elasticsearch_data:
  qdrant_data:
  ollama_data:

services:


  # ─── PostgreSQL + TimescaleDB ───────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: scie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scie
      POSTGRES_USER: scie
      POSTGRES_PASSWORD: scie_secret_password
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scie -d scie"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scie-network

  # ─── Neo4j ─────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.20-community
    container_name: scie-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/scie_neo4j_password
      NEO4J_PLUGINS: '["graph-data-science", "apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*,apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "gds.*,apoc.*"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    ports:
      - "7474:7474"   # HTTP (Browser UI)
      - "7687:7687"   # Bolt (driver)
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - scie-network

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: scie-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scie-network

  # ─── MinIO (Object Storage) ─────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: scie-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: scie_minio_access
      MINIO_ROOT_PASSWORD: scie_minio_secret_key
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - scie-network

  # MinIO initialization (create buckets on startup)
  minio-init:
    image: minio/mc:latest
    container_name: scie-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 scie_minio_access scie_minio_secret_key;
      mc mb -p local/scie-raw-data;
      mc mb -p local/scie-reports;
      mc mb -p local/scie-models;
      echo 'MinIO buckets created.';
      "
    networks:
      - scie-network

  # ─── Elasticsearch ──────────────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: scie-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - scie-network

  # ─── Qdrant (Vector Database) ───────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: scie-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:6333/healthz | grep -q 'ok'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scie-network

  # ─── Ollama (Optional Container - Host Ollama on 11434 is used by default) ──
  ollama:
    image: ollama/ollama:latest
    container_name: scie-ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:11434/api/tags > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - scie-network
    profiles:
      - ollama

  # Ollama model pull on startup (optional profile)
  ollama-init:
    image: ollama/ollama:latest
    container_name: scie-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Pulling Llama3.1:8b...';
      ollama pull llama3.1:8b;
      echo 'Models ready.';
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - scie-network
    profiles:
      - ollama


  # ─── OpenClaw Headless Scraper Worker (FB / IG / TikTok - Sulsel) ─────────
  openclaw-worker:
    build:
      context: ./apps/openclaw-worker
      dockerfile: Dockerfile
    container_name: scie-openclaw-worker
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_STREAM_RAW_POSTS=stream:raw_posts
    depends_on:
      - redis
    networks:
      - scie-network

  # ─── Redis Commander (Dev UI) ───────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: scie-redis-ui
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - scie-network
    profiles:
      - tools    # only start with: docker-compose --profile tools up

